<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>BMET Toolkit Dashboard</title>
</head>

<body class="bg-slate-100 p-6">
    <h1 class="text-2xl font-bold text-blue-900 mb-6 text-center">BMET Toolkit Dashboard</h1>

    <div style="max-width: 800px; margin: 0 auto;">
        <section class="mb-6 bg-white p-4 rounded shadow-sm">
            <h2 class="text-xl font-bold mb-4">Add New Device</h2>
            <div class="flex gap-2">
                <input id="devName" type="text" placeholder="Device Name" class="flex-1">
                <input id="devLoc" type="text" placeholder="Location" style="width: 120px;">
                <input id="devDue" type="date">
                <button id="addDev" class="bg-blue-600 text-white px-4 rounded">Add</button>
            </div>
        </section>

        <section class="bg-white p-4 rounded shadow-sm">
            <h2 class="text-xl font-bold mb-4">Inventory & Status</h2>
            <select id="statusFilter" class="mb-4 w-full">
                <option value="all">All Devices</option>
                <option value="overdue">Overdue Only</option>
            </select>
            <ul id="deviceList" style="list-style: none; padding: 0;"></ul>
        </section>
    </div>
    <script src="options.js"></script>
</body>

</html>
